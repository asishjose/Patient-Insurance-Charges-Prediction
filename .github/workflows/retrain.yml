name: Automated Model Retraining

on:
  schedule:
    - cron: '0 0 * * 0'        # Every Sunday midnight
  push:
    paths:
      - 'data/**.csv'           # New data pushed
  workflow_dispatch:            # Manual trigger

permissions:
  contents: write
  id-token: write

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Retrain model
        run: python train.py

      - name: Evaluate model
        run: python evaluate.py        # fails pipeline if model is worse

      - name: Commit updated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Model/pred_model.pkl baseline_score.txt metrics.txt
          git diff --cached --quiet && echo "No model changes to commit" && exit 0
          git commit -m "Auto-retrain: updated model [skip ci]"
          git pull --rebase origin main
          git push origin main

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1CF11385CCA643E8A6C172FAD94BEABA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F8A341A4FC5C4408BEECAC32FFADDD6A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3DE5B20FF7644B41B605E20306F7DEA0 }}

      - uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push retrained image
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/insurance-predictor:retrain-${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/insurance-predictor:retrain-${{ github.sha }}

      - name: Deploy retrained model
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Patient-Insurance-Charges-Prediction'
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/insurance-predictor:retrain-${{ github.sha }}
